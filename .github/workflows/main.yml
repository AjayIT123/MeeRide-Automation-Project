name: Selenium Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'

      - name: Set up ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Verify Java Version
        run: java -version

      - name: Build Project
        run: mvn clean install

      - name: Run Selenium Tests
        run: mvn test
